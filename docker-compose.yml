services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy_trans
    networks:
      - EasyNetwork
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    env_file:
      - .env

  redis:
    image: redis
    container_name: easy_redis
    networks:
      - EasyNetwork
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6382:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    env_file:
      - .env

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    restart: always
    container_name: easy_celery
    networks:
      - EasyNetwork
    env_file:
      - .env

#  nginx:
